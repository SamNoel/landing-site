media:
  input: src/assets
  output: /assets

content:
  - name: home
    label: Home Page
    type: group
    items:
      - name: homepage-hero
        label: Hero Section
        type: file
        path: src/content/pages/home/homepage-hero.md
        fields:
          - name: title
            label: Title
            type: string

          - name: body
            label: Description
            type: rich-text

      - name: about
        label: About
        type: file
        path: src/content/pages/home/about.md
        fields:
          - name: title
            label: Title
            type: string

          - name: body
            label: Description
            type: rich-text

      - name: services
        label: Services
        type: file
        path: src/content/data/services.json
        list: true
        fields:
          - name: title
            label: Title
            type: string

          - name: text
            label: Service Description
            type: string
